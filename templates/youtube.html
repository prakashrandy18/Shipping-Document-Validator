<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/apl_logo.png') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
    }

    /* Top Bar */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,15,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 8px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .topbar .logo {
      font-size: 1.3rem; font-weight: 700;
      color: #ff4444; cursor: pointer;
      white-space: nowrap; text-decoration: none;
    }
    .topbar .logo span { color: #fff; }
    .back-link {
      color: rgba(255,255,255,0.5); text-decoration: none;
      font-size: 0.85rem; white-space: nowrap;
    }
    .back-link:hover { color: #fff; }
    .search-box {
      flex: 1; max-width: 600px; margin: 0 auto;
      display: flex; gap: 0;
    }
    .search-box input {
      flex: 1; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-right: none; border-radius: 20px 0 0 20px;
      padding: 8px 16px; color: #fff; font-size: 0.95rem;
      outline: none; font-family: inherit;
    }
    .search-box input:focus {
      border-color: #3ea6ff;
      background: rgba(255,255,255,0.08);
    }
    .search-box input::placeholder { color: rgba(255,255,255,0.3); }
    .search-box button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0 20px 20px 0;
      padding: 8px 20px; cursor: pointer;
      color: #fff; font-size: 1.1rem;
    }
    .search-box button:hover { background: rgba(255,255,255,0.12); }

    /* Layout */
    .content { max-width: 1300px; margin: 0 auto; padding: 24px; }

    /* Section Titles */
    .section-title {
      font-size: 1.1rem; font-weight: 600;
      margin-bottom: 16px; color: rgba(255,255,255,0.9);
    }

    /* Video Grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; margin-bottom: 40px;
    }
    .video-card {
      cursor: pointer; border-radius: 12px;
      overflow: hidden; transition: transform 0.2s;
      background: rgba(255,255,255,0.03);
    }
    .video-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.06);
    }
    .video-card .thumb {
      position: relative; width: 100%;
      padding-top: 56.25%; background: #1a1a1a;
    }
    .video-card .thumb img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    .video-card .thumb .duration-badge {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.8); color: #fff;
      font-size: 0.75rem; padding: 2px 6px;
      border-radius: 4px; font-weight: 500;
    }
    .video-card .info { padding: 10px 12px; }
    .video-card .info .title {
      font-size: 0.9rem; font-weight: 500;
      color: #fff; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 4px;
    }
    .video-card .info .meta {
      font-size: 0.8rem; color: rgba(255,255,255,0.4);
    }

    /* Player View */
    .player-view { display: none; }
    .player-view.active { display: block; }
    .player-layout {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 24px;
    }
    @media (max-width: 900px) {
      .player-layout { grid-template-columns: 1fr; }
    }
    .video-player-wrap {
      background: #000; border-radius: 12px;
      overflow: hidden;
    }
    .video-player-wrap video {
      width: 100%; display: block;
      max-height: 70vh;
    }
    .video-details { padding: 16px 0; }
    .video-details h1 {
      font-size: 1.25rem; font-weight: 600;
      margin-bottom: 8px; line-height: 1.4;
    }
    .video-details .stats {
      display: flex; gap: 16px;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem; margin-bottom: 12px;
    }
    .video-details .desc {
      background: rgba(255,255,255,0.05);
      border-radius: 10px; padding: 12px 16px;
      font-size: 0.85rem; color: rgba(255,255,255,0.6);
      line-height: 1.5; white-space: pre-wrap;
    }
    .sidebar-title {
      font-size: 0.95rem; font-weight: 600;
      margin-bottom: 12px;
    }
    .related-list { display: flex; flex-direction: column; gap: 12px; }
    .related-item {
      display: flex; gap: 10px; cursor: pointer;
      border-radius: 8px; padding: 4px;
      transition: background 0.2s;
    }
    .related-item:hover { background: rgba(255,255,255,0.06); }
    .related-item .r-thumb {
      width: 160px; flex-shrink: 0;
      position: relative; border-radius: 8px;
      overflow: hidden;
    }
    .related-item .r-thumb img {
      width: 100%; aspect-ratio: 16/9;
      object-fit: cover; display: block;
    }
    .related-item .r-info { flex: 1; }
    .related-item .r-info .r-title {
      font-size: 0.82rem; font-weight: 500;
      color: #fff; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .related-item .r-info .r-meta {
      font-size: 0.75rem; color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    /* Loading / Error */
    .loading-overlay {
      display: none; text-align: center; padding: 80px 20px;
    }
    .loading-overlay.active { display: block; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #ff4444;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { color: rgba(255,255,255,0.4); }
    .error-msg {
      display: none; background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.2);
      border-radius: 10px; padding: 12px 16px;
      color: #ff6b6b; font-size: 0.9rem; margin-bottom: 16px;
    }
    .error-msg.active { display: block; }

    /* Back to browse button */
    .back-to-browse {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.5); font-size: 0.85rem;
      cursor: pointer; margin-bottom: 16px;
      padding: 6px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s;
    }
    .back-to-browse:hover {
      color: #fff; background: rgba(255,255,255,0.08);
    }

    .empty-state {
      text-align: center; padding: 80px 20px;
      color: rgba(255,255,255,0.3);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <a href="/" class="back-link">← Validator</a>
    <a class="logo" onclick="showBrowse()">▶ <span>YouTube</span></a>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search videos..." 
             onkeydown="if(event.key==='Enter')doSearch()" />
      <button onclick="doSearch()">🔍</button>
    </div>
  </div>

  <div class="content">
    <div id="errorMsg" class="error-msg"></div>

    <!-- Browse View (default) -->
    <div id="browseView">
      <div id="loadingBrowse" class="loading-overlay active">
        <div class="spinner"></div>
        <p>Loading trending videos...</p>
      </div>
      <div id="trendingSection" style="display:none;">
        <h2 class="section-title">🔥 Trending</h2>
        <div id="trendingGrid" class="video-grid"></div>
      </div>
      <div id="searchSection" style="display:none;">
        <h2 id="searchTitle" class="section-title"></h2>
        <div id="searchGrid" class="video-grid"></div>
      </div>
      <div id="emptyState" class="empty-state" style="display:none;">
        <div class="icon">🔍</div>
        <p>Search for any video to get started</p>
      </div>
    </div>

    <!-- Player View -->
    <div id="playerView" class="player-view">
      <div class="back-to-browse" onclick="showBrowse()">← Back to browse</div>
      <div class="player-layout">
        <div>
          <div class="video-player-wrap">
            <video id="videoPlayer" controls autoplay></video>
          </div>
          <div class="video-details">
            <h1 id="playerTitle"></h1>
            <div class="stats">
              <span id="playerUploader">👤 —</span>
              <span id="playerViews">👁 —</span>
              <span id="playerDate">📅 —</span>
            </div>
            <div id="playerDesc" class="desc" style="display:none;"></div>
          </div>
        </div>
        <div>
          <h3 class="sidebar-title">Related Videos</h3>
          <div id="relatedList" class="related-list"></div>
        </div>
      </div>
    </div>

    <div id="loadingPlayer" class="loading-overlay">
      <div class="spinner"></div>
      <p>Loading video...</p>
    </div>
  </div>

  <script>
    let lastSearchQuery = '';

    // Init: load trending
    loadTrending();

    async function loadTrending() {
      showLoading('browse');
      try {
        const res = await fetch('/youtube/trending');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        if (data.results && data.results.length > 0) {
          renderGrid('trendingGrid', data.results);
          el('trendingSection').style.display = '';
          el('emptyState').style.display = 'none';
        } else {
          el('emptyState').style.display = '';
        }
      } catch (e) {
        el('emptyState').style.display = '';
      }
      hideLoading('browse');
    }

    async function doSearch() {
      const q = el('searchInput').value.trim();
      if (!q) return;
      lastSearchQuery = q;
      showLoading('browse');
      hideError();
      el('searchSection').style.display = 'none';

      try {
        const res = await fetch(`/youtube/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Search failed');

        el('searchTitle').textContent = `Results for "${q}"`;
        renderGrid('searchGrid', data.results);
        el('searchSection').style.display = '';
        el('trendingSection').style.display = 'none';
        el('emptyState').style.display = 'none';
      } catch (e) {
        showError(e.message);
      }
      hideLoading('browse');
    }

    async function playVideo(videoId) {
      el('browseView').style.display = 'none';
      el('playerView').classList.remove('active');
      showLoading('player');
      hideError();

      try {
        // Get info
        const infoRes = await fetch(`/youtube/info?v=${videoId}`);
        const info = await infoRes.json();
        if (!infoRes.ok) throw new Error(info.error || 'Failed to load video info');

        // Set player
        el('videoPlayer').src = `/youtube/stream?v=${videoId}`;
        el('playerTitle').textContent = info.title;
        el('playerUploader').textContent = `👤 ${info.uploader}`;
        el('playerViews').textContent = `👁 ${formatViews(info.view_count)}`;
        el('playerDate').textContent = `📅 ${formatDate(info.upload_date)}`;
        
        if (info.description) {
          el('playerDesc').textContent = info.description;
          el('playerDesc').style.display = '';
        } else {
          el('playerDesc').style.display = 'none';
        }

        hideLoading('player');
        el('playerView').classList.add('active');

        // Load related (search by similar title)
        loadRelated(info.title.split(' ').slice(0,3).join(' '));

      } catch (e) {
        hideLoading('player');
        showError(e.message);
        showBrowse();
      }
    }

    async function loadRelated(query) {
      try {
        const res = await fetch(`/youtube/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        if (data.results) {
          renderRelated(data.results.slice(0, 10));
        }
      } catch (e) { /* silent */ }
    }

    function showBrowse() {
      el('playerView').classList.remove('active');
      el('browseView').style.display = '';
      el('videoPlayer').pause();
      el('videoPlayer').src = '';
    }

    // --- Rendering ---
    function renderGrid(containerId, videos) {
      const container = el(containerId);
      container.innerHTML = videos.map(v => `
        <div class="video-card" onclick="playVideo('${v.id}')">
          <div class="thumb">
            <img src="${v.thumbnail}" alt="" loading="lazy" 
                 onerror="this.style.background='#1a1a1a'" />
            ${v.duration ? `<span class="duration-badge">${formatDuration(v.duration)}</span>` : ''}
          </div>
          <div class="info">
            <div class="title">${escHtml(v.title)}</div>
            <div class="meta">${escHtml(v.uploader)} ${v.view_count ? '· ' + formatViews(v.view_count) + ' views' : ''}</div>
          </div>
        </div>
      `).join('');
    }

    function renderRelated(videos) {
      el('relatedList').innerHTML = videos.map(v => `
        <div class="related-item" onclick="playVideo('${v.id}')">
          <div class="r-thumb">
            <img src="${v.thumbnail}" alt="" loading="lazy" />
          </div>
          <div class="r-info">
            <div class="r-title">${escHtml(v.title)}</div>
            <div class="r-meta">${escHtml(v.uploader)}</div>
          </div>
        </div>
      `).join('');
    }

    // --- Helpers ---
    function el(id) { return document.getElementById(id); }
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }
    function formatDuration(s) {
      if (!s) return '';
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
      return `${m}:${String(sec).padStart(2,'0')}`;
    }
    function formatViews(n) {
      if (!n) return '';
      if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
      if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
      return n.toString();
    }
    function formatDate(d) {
      if (!d || d.length < 8) return '';
      return `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
    }
    function showLoading(type) {
      if (type === 'browse') el('loadingBrowse').classList.add('active');
      else el('loadingPlayer').classList.add('active');
    }
    function hideLoading(type) {
      if (type === 'browse') el('loadingBrowse').classList.remove('active');
      else el('loadingPlayer').classList.remove('active');
    }
    function showError(msg) {
      const e = el('errorMsg');
      e.textContent = '❌ ' + msg;
      e.classList.add('active');
    }
    function hideError() { el('errorMsg').classList.remove('active'); }
  </script>
</body>
</html>
